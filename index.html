<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suzuki 專業貸款試算</title>
    <style>
        :root { --suzuki-red: #ED1C24; }
        body { font-family: -apple-system, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--suzuki-red); color: white; padding: 20px; text-align: center; font-size: 20px; font-weight: bold; }
        .content { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: #555; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fafafa; }
        input:focus { outline: none; border-color: var(--suzuki-red); background: white; }
        button { width: 100%; padding: 16px; background: var(--suzuki-red); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.1s; margin-top: 10px; }
        button:active { transform: scale(0.97); opacity: 0.9; }
        .result-card { margin-top: 20px; background: #fff5f5; border: 1px solid #ffdede; border-radius: 12px; padding: 15px; display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .result-row:last-child { border-bottom: none; }
        .label-text { color: #666; font-size: 15px; }
        .val { color: var(--suzuki-red); font-weight: bold; font-size: 18px; }
        .highlight { background: #ffebeb; padding: 5px 10px; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">SUZUKI 貸款補貼息試算</div>
    <div class="content">
        <div class="input-group">
            <label>申貸金額 (萬元)</label>
            <input type="number" id="amt" value="60">
        </div>
        <div class="input-group">
            <label>客戶(實質)利率 (%)</label>
            <input type="number" id="rate" step="0.01" value="3.5">
        </div>
        <div class="input-group">
            <label>攤還期數 (月)</label>
            <input type="number" id="period" value="60">
        </div>
        
        <button onclick="doCalc()">開始試算</button>

        <div id="res" class="result-card">
            <div class="result-row">
                <span class="label-text">每月應付金額</span>
                <span class="val" id="m_pay">0</span>
            </div>
            <div class="result-row highlight">
                <span class="label-text">總補貼息 (折現)</span>
                <span class="val" id="subsidy">0</span>
            </div>
            <div class="result-row">
                <span class="label-text">實撥金額</span>
                <span class="val" id="actual_amt" style="color:#333;">0</span>
            </div>
            <p style="font-size: 12px; color: #888; margin-top: 10px;">* 實撥金額 = 申貸金額 - 補貼息</p>
        </div>
    </div>
</div>

<script>
function doCalc() {
    const PV = document.getElementById('amt').value * 10000;
    const annualRate = document.getElementById('rate').value / 100;
    const n = document.getElementById('period').value;

    if (!PV || !annualRate || !n) return;

    const r = annualRate / 12;
    // 1. 每月月付額 (本息平均攤還)
    const monthly = Math.round(PV * (Math.pow(1 + r, n) * r) / (Math.pow(1 + r, n) - 1));
    
    // 2. 補貼息計算 (銀行通常採用的現值折抵法)
    // 這裡我們計算總利息支出，即為補貼息金額
    const totalPay = monthly * n;
    const subsidy = totalPay - PV;
    
    // 3. 實撥金額
    const actualAmt = PV - subsidy;

    document.getElementById('res').style.display = 'block';
    document.getElementById('m_pay').innerText = '$ ' + monthly.toLocaleString();
    document.getElementById('subsidy').innerText = '$ ' + subsidy.toLocaleString();
    document.getElementById('actual_amt').innerText = '$ ' + actualAmt.toLocaleString();
}
</script>

</body>
</html>
