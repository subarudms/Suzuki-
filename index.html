<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈴木卡好貸</title>
    <link rel="apple-touch-icon" href="logo.jpeg">
    <style>
        :root { --suzuki-red: #ED1C24; --bg: #222; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); overflow: hidden; }
        
        .header { 
            background-image: url('logo.jpeg');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            height: 100px; display: flex; justify-content: center; align-items: center; position: relative; background-color: white;
        }
        .header-title-overlay { 
            font-size: 24px; font-weight: 900; color: var(--suzuki-red); letter-spacing: 2px;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff; margin-top: 10px;
        }

        /* 專案按鈕區 */
        .project-group { padding: 15px 15px 5px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; background: #fdfdfd; }
        .btn-proj { 
            padding: 8px 4px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-weight: bold;
            background: white; color: #555; cursor: pointer; transition: 0.2s;
        }
        .btn-proj:active { background: #eee; transform: scale(0.95); }
        .btn-proj.active { background: var(--suzuki-red); color: white; border-color: var(--suzuki-red); }

        .content { padding: 15px 20px; }
        .proj-note { font-size: 13px; color: var(--suzuki-red); font-weight: bold; text-align: center; margin-bottom: 15px; min-height: 18px; }
        
        .input-row { display: flex; align-items: center; margin-bottom: 12px; }
        .input-row label { width: 85px; font-size: 14px; color: #444; font-weight: bold; }
        .input-row input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: right; background: #fafafa; }
        .input-row span { margin-left: 8px; width: 25px; color: #888; font-size: 13px; }

        .btn-main-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-main { flex: 1; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; border: none; transition: 0.1s; }
        .btn-calc { background: var(--suzuki-red); color: white; }
        .btn-clear { background: #eee; color: #666; }

        .result-area { margin-top: 20px; border-top: 2px solid #f9f9f9; padding-top: 15px; display: none; }
        .res-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .res-val { font-weight: bold; font-family: 'Arial', sans-serif; font-size: 18px; color: #333; }
        .highlight { color: var(--suzuki-red); font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-title-overlay">鈴木卡好貸</div>
    </div>

    <div class="project-group">
        <button class="btn-proj" onclick="setProj('JIMNY 48期', 2.5, 48)">Jimny 48期</button>
        <button class="btn-proj" onclick="setProj('JIMNY 24期', 2.5, 24)">Jimny 24期</button>
        <button class="btn-proj" onclick="setProj('JIMNY 36期', 2.5, 36)">Jimny 36期</button>
        <button class="btn-proj" onclick="setProj('CARRY 24期零利率', 0, 24)">Carry 24期</button>
        <button class="btn-proj" onclick="setProj('CARRY 48期發發發', 3.19, 48)">Carry 48期</button>
    </div>

    <div class="content">
        <div id="projName" class="proj-note"></div>
        
        <div class="input-row">
            <label>申貸金額</label>
            <input type="number" id="amt" placeholder="請輸入金額" value="500000">
            <span>元</span>
        </div>
        <div class="input-row">
            <label>客戶利率</label>
            <input type="number" id="c_rate" step="0.01" value="2.5">
            <span>%</span>
        </div>
        <div class="input-row">
            <label>實質利率</label>
            <input type="number" id="r_rate" step="0.01" value="3.75">
            <span>%</span>
        </div>
        <div class="input-row">
            <label>攤還期數</label>
            <input type="number" id="period" value="48">
            <span>期</span>
        </div>
        
        <div class="btn-main-group">
            <button type="button" class="btn-main btn-calc" onclick="doCalc()">開 始 試 算</button>
            <button type="button" class="btn-main btn-clear" onclick="doClear()">清 除</button>
        </div>

        <div id="res" class="result-area">
            <div class="res-row"><span>每月付款金額</span><span class="res-val" id="m_pay">$ 0</span></div>
            <div class="res-row"><span>繳息總額</span><span class="res-val" id="total_interest">$ 0</span></div>
            <div class="res-row"><span>補貼息總額</span><span class="res-val highlight" id="subsidy">$ 0</span></div>
            <div class="res-row"><span>銀行實撥金額</span><span class="res-val" id="actual_amt">$ 0</span></div>
        </div>
    </div>
</div>

<script>
// 設定專案快速鍵
function setProj(name, rate, period) {
    document.getElementById('projName').innerText = "當前專案：" + name;
    document.getElementById('c_rate').value = rate;
    document.getElementById('period').value = period;
    
    // 如果是 Carry 24期零利率，通常實質利率會高一點，這裡預設 3.75，你可再微調
    if (rate === 0) {
        document.getElementById('r_rate').value = 3.75;
    } else {
        document.getElementById('r_rate').value = rate;
    }
    
    // 高亮顯示按鍵
    const buttons = document.querySelectorAll('.btn-proj');
    buttons.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}

function doCalc() {
    const PV = parseFloat(document.getElementById('amt').value) || 0;
    const cRateRaw = parseFloat(document.getElementById('c_rate').value) || 0;
    const rRateRaw = parseFloat(document.getElementById('r_rate').value) || 0;
    const n = parseInt(document.getElementById('period').value) || 0;

    if (PV <= 0 || n <= 0) { alert("請輸入貸款金額與期數"); return; }

    const clientMonthlyRate = cRateRaw / 100 / 12;
    const realMonthlyRate = rRateRaw / 100 / 12;

    let monthlyPay;
    if (cRateRaw === 0) {
        monthlyPay = Math.ceil(PV / n);
    } else {
        monthlyPay = Math.round(PV * (Math.pow(1 + clientMonthlyRate, n) * clientMonthlyRate) / (Math.pow(1 + clientMonthlyRate, n) - 1));
    }

    let totalInterest = 0;
    if (cRateRaw > 0) {
        totalInterest = (monthlyPay * n) - PV;
        if (totalInterest < 0) totalInterest = 0;
    }

    let subsidy = 0;
    let actualAmt = PV;
    if (cRateRaw === rRateRaw) {
        subsidy = 0;
    } else if (realMonthlyRate > 0) {
        const pvOfAnnuity = monthlyPay * ((1 - Math.pow(1 + realMonthlyRate, -n)) / realMonthlyRate);
        subsidy = Math.round(PV - pvOfAnnuity);
        if (subsidy < 0) subsidy = 0;
        actualAmt = PV - subsidy;
    }

    document.getElementById('res').style.display = 'block';
    document.getElementById('m_pay').innerText = '$ ' + monthlyPay.toLocaleString();
    document.getElementById('total_interest').innerText = '$ ' + totalInterest.toLocaleString();
    document.getElementById('subsidy').innerText = '$ ' + subsidy.toLocaleString();
    document.getElementById('actual_amt').innerText = '$ ' + actualAmt.toLocaleString();
}

function doClear() {
    document.getElementById('amt').value = "";
    document.getElementById('c_rate').value = "";
    document.getElementById('r_rate').value = "";
    document.getElementById('period').value = "";
    document.getElementById('projName').innerText = "";
    document.getElementById('res').style.display = 'none';
    const buttons = document.querySelectorAll('.btn-proj');
    buttons.forEach(btn => btn.classList.remove('active'));
}
</script>

</body>
</html>
